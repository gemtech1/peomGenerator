    <main>
      <form id="poem-generator-form>

          type="text"
          placeholder="Enter the topic of the English poem"
          autofocus
          required
          autocomplete="off"
          class = "steps"
        />
         <input type="submit" value="Search" class="search-button"  id = seachPoem/>
        <input type="submit" />
      </form>
