<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>AI English Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI English Poem Generator</h1>
      </header>

      <main>
        <div class="form-container">
          <form id="poem-generator-form" class ="form">
            <input
              type="text"
              placeholder="Enter the topic of a French poem"
              autofocus
              required
              autocomplete="off"
              class="instructions"
              id="user-instructions"
            />
            <input type="submit" class="submit-button" />
          </form>
          <div class="hint">i.e: Flower, Paris or Cheese</div>
        </div>
        <div class="poem hidden" id="poem"></div>
      </main>

 <footer>
        <p>
          This project was coded by
          <a href="https://github.com/gemtech1" target="_blank">Ladi A</a>
          and is
          <a href="https://github.com/gemtech1/weatherapp" target="_blank">
            on GitHub</a
          >
          and
          <a href="https://gregarious-fairy-9501cd.netlify.app/" target="_blank"
            >hosted on Netlify</a
          >
        </p>
      </footer>
      </div>


    <script src="src/index.js"></script>
  </body>
</html>
